<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineTrack AI Ultimate - Premium Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0a0a0a; --bg-surface: #141414; --bg-card: #1f1f1f;
      --accent: #e50914; --accent-hover: #b80710;
      --text-main: #ffffff; --text-muted: #aaaaaa;
      --border: rgba(255, 255, 255, 0.1); --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Vazirmatn', sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-main); padding-bottom: 60px; }
    
    /* Layout & Components */
    header { background: var(--bg-surface); padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .brand { font-size: 24px; font-weight: 900; color: var(--accent); }
    .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
    
    /* Buttons & Inputs */
    .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    .btn-secondary { background: #2a2a2a; border: 1px solid var(--border); color: #fff; }
    .form-control { background: #2b2b2b; border: 1px solid var(--border); color: #fff; padding: 10px; width: 100%; border-radius: 8px; }
    
    /* Modals */
    .modal-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 300; display: none; justify-content: center; align-items: center; }
    .modal-backdrop.active { display: flex; }
    .modal-box { background: #1c1c1c; border: 1px solid var(--border); border-radius: 16px; width: 90%; max-width: 600px; padding: 25px; max-height: 90vh; overflow-y: auto; }
    
    /* Stars Rating */
    .stars-rating { display: flex; gap: 5px; font-size: 24px; cursor: pointer; color: #555; }
    .stars-rating span.active { color: #ffc107; }
    
    /* Text Area */
    .notes-area { width: 100%; height: 300px; background: #000; color: #fff; border: 1px solid var(--border); padding: 15px; border-radius: 8px; }
  </style>
</head>
<body>

<header>
  <div class="brand">🎬 CineTrack AI Ultimate</div>
  <div style="display: flex; gap: 10px;">
    <button class="btn btn-secondary" onclick="openNotesModal()">📝 یادداشت‌ها</button>
    <button class="btn btn-secondary" onclick="openSettingsModal()">⚙️ تنظیمات</button>
  </div>
</header>

<main class="main-grid" id="mainGrid"></main>

<div class="modal-backdrop" id="notesModal">
  <div class="modal-box">
    <h3>📝 یادداشت‌ها و ضبط صدا</h3>
    <textarea id="generalNotesTextArea" class="notes-area" oninput="saveNotes(this.value)"></textarea>
    <div style="margin-top: 15px; display:flex; gap: 10px;">
      <button class="btn" onclick="startVoiceDictation()">🎤 شروع ضبط صدا</button>
      <button class="btn btn-secondary" onclick="closeModal('notesModal')">بستن</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="addModal">
  <div class="modal-box">
    <h3>ثبت امتیاز برای اثر</h3>
    <div class="stars-rating" id="modalStars">
      <span onclick="setStarsValue(1)">★</span>
      <span onclick="setStarsValue(2)">★</span>
      <span onclick="setStarsValue(3)">★</span>
      <span onclick="setStarsValue(4)">★</span>
      <span onclick="setStarsValue(5)">★</span>
    </div>
    <input type="hidden" id="formRating" value="0">
    <button class="btn" style="width:100%; margin-top:20px;" onclick="saveRating()">ذخیره</button>
  </div>
</div>

<div class="modal-backdrop" id="settingsModal">
  <div class="modal-box">
    <h3>⚙️ تنظیمات سیستم</h3>
    <div style="margin-top:20px;">
      <label>آدرس سایت مرجع برای Parser:</label>
      <input type="url" id="settingsRefUrl" class="form-control" value="https://dls2.film2cinemaha.top/DonyayeSerial/donyaye_serial_all_archive.html">
    </div>
    <button class="btn" style="width:100%; margin-top:20px;" onclick="saveSettings()">ذخیره</button>
  </div>
</div>

<script>
  /* ================= Initialization ================= */
  let state = {
    items: JSON.parse(localStorage.getItem("cinetrack_db") || "[]"),
    notes: localStorage.getItem("cinetrack_general_notes") || "",
    refUrl: localStorage.getItem("cinetrack_ref_url") || "https://dls2.film2cinemaha.top/DonyayeSerial/donyaye_serial_all_archive.html"
  };

  function init() {
    document.getElementById("generalNotesTextArea").value = state.notes;
    document.getElementById("settingsRefUrl").value = state.refUrl;
  }

  /* ================= Notes & Voice (RESTORED) ================= */
  function startVoiceDictation() {
    if (!('webkitSpeechRecognition' in window)) {
      alert("مرورگر شما از قابلیت ضبط صدا پشتیبانی نمی‌کند.");
      return;
    }
    const rec = new webkitSpeechRecognition();
    rec.lang = 'fa-IR';
    rec.continuous = false;
    rec.onresult = (e) => {
      const text = e.results[0][0].transcript;
      const area = document.getElementById('generalNotesTextArea');
      area.value += " " + text;
      saveNotes(area.value);
    };
    rec.start();
  }

  function saveNotes(val) {
    state.notes = val;
    localStorage.setItem("cinetrack_general_notes", val);
  }

  /* ================= Rating System (RESTORED) ================= */
  function setStarsValue(rating) {
    document.getElementById("formRating").value = rating;
    document.querySelectorAll("#modalStars span").forEach((star, index) => {
      star.className = index < rating ? "active" : "";
    });
  }

  function saveRating() {
    const val = document.getElementById("formRating").value;
    alert("امتیاز " + val + " ستاره ذخیره شد.");
    closeModal('addModal');
  }

  /* ================= Parser Logic (Link Resolver) ================= */
  async function resolveEpisodeLink(season, episode, title) {
    try {
      const response = await fetch(state.refUrl);
      const html = await response.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const links = Array.from(doc.querySelectorAll('a'));

      const matches = links.filter(a => {
        const text = (a.innerText + a.href).toLowerCase();
        // جستجوی هوشمند برای فصل و قسمت
        const sMatch = text.includes(`s${season.toString().padStart(2, '0')}`) || text.includes(`season ${season}`);
        const eMatch = text.includes(`e${episode.toString().padStart(2, '0')}`) || text.includes(`episode ${episode}`);
        return sMatch && eMatch;
      });

      if (matches.length > 0) {
        window.open(matches[0].href, '_blank');
      } else {
        alert("لینک دقیق یافت نشد. منبع آرشیو را بررسی کنید.");
      }
    } catch (e) {
      alert("خطای شبکه یا عدم دسترسی به منبع: " + e.message);
    }
  }

  /* ================= Utils ================= */
  function openNotesModal() { document.getElementById("notesModal").classList.add("active"); }
  function openSettingsModal() { document.getElementById("settingsModal").classList.add("active"); }
  function closeModal(id) { document.getElementById(id).classList.remove("active"); }
  
  function saveSettings() {
    state.refUrl = document.getElementById("settingsRefUrl").value;
    localStorage.setItem("cinetrack_ref_url", state.refUrl);
    alert("تنظیمات با موفقیت ذخیره شد.");
    closeModal('settingsModal');
  }

  window.onload = init;
</script>

</body>
</html>
